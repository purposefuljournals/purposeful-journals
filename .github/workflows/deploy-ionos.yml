name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload site via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check SFTP secrets
        run: |
          if [ -z "${{ secrets.IONOS_SFTP_SERVER }}" ]; then
            echo "::error::Missing secret IONOS_SFTP_SERVER"
            exit 1
          fi
          if [ -z "${{ secrets.IONOS_SFTP_USERNAME }}" ]; then
            echo "::error::Missing secret IONOS_SFTP_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.IONOS_SFTP_PASSWORD }}" ]; then
            echo "::error::Missing secret IONOS_SFTP_PASSWORD"
            exit 1
          fi
          echo "All three SFTP secrets are present."

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site to IONOS
        env:
          SFTP_HOST: ${{ secrets.IONOS_SFTP_SERVER }}
          SFTP_USER: ${{ secrets.IONOS_SFTP_USERNAME }}
          SFTP_PASS: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no"
          open -u "${SFTP_USER}","${SFTP_PASS}" sftp://${SFTP_HOST}
          mirror -R --verbose --exclude .git/ --exclude .github/ --exclude .gitignore ./ ./
          bye
          EOF
