name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload site via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check SFTP secrets
        run: |
          if [ -z "${{ secrets.IONOS_SFTP_SERVER }}" ]; then
            echo "::error::Missing secret IONOS_SFTP_SERVER"
            exit 1
          fi
          if [ -z "${{ secrets.IONOS_SFTP_USERNAME }}" ]; then
            echo "::error::Missing secret IONOS_SFTP_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.IONOS_SFTP_PASSWORD }}" ]; then
            echo "::error::Missing secret IONOS_SFTP_PASSWORD"
            exit 1
          fi
          echo "All three SFTP secrets are present."

      - name: Prepare files for upload
        run: rm -rf .github .gitignore

      - name: Deploy to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.IONOS_SFTP_SERVER }}
          username: ${{ secrets.IONOS_SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: 22
          localDir: ./
          remoteDir: ./
          sftpOnly: true
